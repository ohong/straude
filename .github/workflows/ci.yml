name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ~/.bun/install/cache

      - name: Phantom dependency check (apps/web)
        run: |
          set -euo pipefail
          # depcheck exits 255 on any finding (unused or missing); we only
          # want to fail on missing, so tolerate the non-zero exit and
          # gate on .missing length ourselves.
          RESULT=$(bunx depcheck --json --skip-missing=false \
            --ignores="@types/*,@tailwindcss/postcss,tailwindcss,eslint,eslint-config-next,@playwright/test,@testing-library/*,@vitejs/plugin-react,jsdom,typescript,vitest,@types/node" || true)
          MISSING=$(echo "$RESULT" | jq -r '.missing | keys | length')
          UNUSED=$(echo "$RESULT" | jq -r '.dependencies | length')
          if [ "$UNUSED" -gt 0 ]; then
            echo "::warning::Unused dependencies in apps/web/package.json: $(echo "$RESULT" | jq -rc '.dependencies')"
          fi
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::Phantom dependencies found (imported but not in package.json):"
            echo "$RESULT" | jq '.missing'
            exit 1
          fi
          echo "No phantom dependencies."
        working-directory: apps/web

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          SUPABASE_SECRET_KEY: sb_secret_placeholder

      - name: Test (web)
        run: bun run test
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          SUPABASE_SECRET_KEY: sb_secret_placeholder

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: bunx supabase start --workdir .

      - name: Test (web — integration, real Supabase)
        run: bun run test:integration
        working-directory: apps/web

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: apps/web

      - name: E2E tests
        run: bun run test:e2e
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          SUPABASE_SECRET_KEY: sb_secret_placeholder

  cli-package:
    name: CLI package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck CLI
        run: bun run typecheck
        working-directory: packages/cli

      - name: Test CLI
        run: bun run test
        working-directory: packages/cli

      - name: Benchmark collector fixture
        run: bun run benchmark:collector > ../../collector-benchmark.json
        working-directory: packages/cli
        env:
          STRAUDE_COLLECTOR_BENCH_ITERATIONS: "3"

      - name: Upload collector benchmark
        uses: actions/upload-artifact@v4
        with:
          name: straude-collector-benchmark-${{ github.sha }}
          path: collector-benchmark.json
          if-no-files-found: error
          retention-days: 14

      - name: Pack release candidate
        run: |
          mkdir -p ../../artifacts
          npm pack --json --pack-destination ../../artifacts
        working-directory: packages/cli

      - name: Upload exact package
        uses: actions/upload-artifact@v4
        with:
          name: straude-cli-package
          path: artifacts/*.tgz
          if-no-files-found: error

      - name: Upload CI source map
        uses: actions/upload-artifact@v4
        with:
          name: straude-cli-sourcemap-${{ github.sha }}
          path: packages/cli/dist/index.js.map
          if-no-files-found: error
          retention-days: 14

  cli-package-matrix:
    name: CLI package (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: cli-package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - uses: actions/download-artifact@v4
        with:
          name: straude-cli-package
          path: artifacts

      - name: Test installed package
        run: node packages/cli/scripts/packaged-cli-e2e.mjs --tarball artifacts
